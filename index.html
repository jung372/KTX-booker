<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KTX 특실 자동 예약</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 60px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #1a3c6e; margin-bottom: 6px; text-align: center; }
    .subtitle { font-size: 0.82rem; color: #718096; margin-bottom: 24px; text-align: center; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 22px 26px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* 스케줄 상태 배지 */
    .schedule-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .schedule-badge.ready   { background: #c6f6d5; color: #276749; }
    .schedule-badge.loading { background: #bee3f8; color: #2a4365; }
    .schedule-badge.none    { background: #fed7d7; color: #742a2a; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    label:first-of-type { margin-top: 0; }

    input, select {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #cbd5e0;
      border-radius: 7px;
      font-size: 0.88rem;
      color: #2d3748;
      background: #f7fafc;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { outline: none; border-color: #3b82f6; background: #fff; }

    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; }

    .hint { font-size: 0.72rem; color: #a0aec0; margin-top: 3px; }
    .hint a { color: #3b82f6; }

    .pat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; margin-top: 12px; }
    .pat-row label { margin: 0; }
    .pat-toggle { font-size: 0.72rem; color: #3b82f6; cursor: pointer; }

    .btn {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-search { background: #2b6cb0; color: #fff; }
    .btn-search:hover:not(:disabled) { background: #2c5282; }
    .btn-book   { background: #276749; color: #fff; }
    .btn-book:hover:not(:disabled)   { background: #22543d; }
    .btn-live   { background: #744210; color: #fff; font-size: 0.82rem; margin-top: 10px; }
    .btn-live:hover:not(:disabled)   { background: #5c3209; }

    .toast {
      display: none;
      margin-top: 10px;
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 500;
    }
    .toast.ok  { display: block; background: #c6f6d5; color: #22543d; }
    .toast.err { display: block; background: #fed7d7; color: #742a2a; }
    .toast.info { display: block; background: #bee3f8; color: #2a4365; }

    #live-status {
      display: none;
      margin-top: 12px;
      text-align: center;
      font-size: 0.82rem;
      color: #4a5568;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #cbd5e0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 열차 목록 */
    #train-section { display: none; }
    .train-meta { font-size: 0.75rem; color: #a0aec0; margin-bottom: 10px; }

    .train-grid { display: flex; flex-direction: column; gap: 7px; }

    .train-card {
      border: 2px solid #e2e8f0;
      border-radius: 9px;
      padding: 11px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .train-card:hover    { border-color: #90cdf4; background: #ebf8ff; }
    .train-card.selected { border-color: #3b82f6; background: #ebf8ff; }

    .train-no {
      font-size: 0.88rem;
      font-weight: 700;
      color: #1a3c6e;
      min-width: 46px;
      text-align: center;
      line-height: 1.3;
    }
    .train-times { flex: 1; }
    .time-row {
      font-size: 1rem;
      font-weight: 600;
      color: #2d3748;
    }
    .time-row .arrow { color: #a0aec0; font-size: 0.8rem; margin: 0 4px; }
    .station-row { font-size: 0.73rem; color: #a0aec0; margin-top: 2px; }

    .empty-msg { text-align: center; color: #a0aec0; font-size: 0.85rem; padding: 18px 0; }

    /* 예약 섹션 */
    #book-section { display: none; }
    .selected-info {
      background: #ebf8ff;
      border: 1px solid #bee3f8;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: #2a4365;
    }
    .book-note { font-size: 0.73rem; color: #a0aec0; margin-top: 8px; }

    /* 최근 실행 */
    #run-list { list-style: none; }
    #run-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f4f8;
      font-size: 0.8rem;
      color: #4a5568;
    }
    #run-list li:last-child { border-bottom: none; }
    .badge {
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 7px; border-radius: 99px;
    }
    .badge.success     { background: #c6f6d5; color: #276749; }
    .badge.failure     { background: #fed7d7; color: #742a2a; }
    .badge.in_progress,
    .badge.queued      { background: #bee3f8; color: #2a4365; }
    .badge.cancelled   { background: #e2e8f0; color: #718096; }

    .icon-btn {
      background: none; border: 1px solid #cbd5e0;
      border-radius: 6px; padding: 2px 8px;
      font-size: 0.75rem; cursor: pointer; color: #4a5568;
    }
    .icon-btn:hover { background: #f0f4f8; }

    footer { margin-top: 14px; font-size: 0.72rem; color: #a0aec0; text-align: center; }
    footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>

<h1>🚄 KTX 특실 자동 예약</h1>
<p class="subtitle">매일 자정 7일치 시간표 자동 갱신 · 특실 빈 자리 감지 즉시 예약</p>

<!-- ── 조회 카드 ── -->
<div class="card">
  <div class="card-title">
    🔍 열차 조회
    <span class="schedule-badge loading" id="schedule-badge">시간표 로딩 중...</span>
  </div>

  <div class="row">
    <div>
      <label for="dep_station">출발역</label>
      <select id="dep_station" onchange="onRouteChange()"></select>
    </div>
    <div>
      <label for="arr_station">도착역</label>
      <select id="arr_station" onchange="onRouteChange()"></select>
    </div>
  </div>

  <div class="row">
    <div>
      <label for="dep_date">날짜</label>
      <input type="date" id="dep_date" onchange="onRouteChange()" />
    </div>
    <div>
      <label for="dep_time">희망 시간 이후</label>
      <input type="time" id="dep_time" value="06:00" onchange="onRouteChange()" />
    </div>
  </div>

  <div class="pat-row">
    <label for="pat">GitHub Personal Access Token</label>
    <span class="pat-toggle" onclick="togglePat()">👁 보기/숨기기</span>
  </div>
  <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="savePat(this.value)" />
  <p class="hint">
    브라우저에만 저장 · 서버 전송 없음 &nbsp;
    <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=KTX-booker" target="_blank">토큰 발급 →</a>
  </p>

  <!-- 실시간 조회 fallback (사전 스케줄 없을 때만 표시) -->
  <button class="btn btn-live" id="live-btn" style="display:none" onclick="doLiveSearch()">
    🌐 실시간 조회 (이 구간은 사전 데이터 없음)
  </button>
  <div id="live-status"><span class="spinner"></span><span id="live-msg">조회 중...</span></div>
  <div class="toast" id="search-toast"></div>
</div>

<!-- ── 열차 선택 카드 ── -->
<div class="card" id="train-section">
  <div class="card-title">
    🚉 열차 선택
    <span style="font-size:0.75rem;font-weight:400;color:#a0aec0;" id="time-range-label"></span>
  </div>
  <p class="train-meta" id="train-meta"></p>
  <div class="train-grid" id="train-grid"></div>
</div>

<!-- ── 예약 카드 ── -->
<div class="card" id="book-section">
  <div class="card-title">✅ 예약 봇 시작</div>
  <div class="selected-info" id="selected-info"></div>
  <p class="book-note">봇이 해당 열차의 특실 빈 자리를 감지하는 즉시 예약하고 텔레그램으로 알립니다.</p>
  <button class="btn btn-book" id="book-btn" onclick="doBook()" disabled>🚀 예약 봇 시작</button>
  <div class="toast" id="book-toast"></div>
</div>

<!-- ── 최근 실행 ── -->
<div class="card">
  <div class="card-title">
    📋 최근 실행 현황
    <button class="icon-btn" onclick="loadRuns()">↻ 새로고침</button>
  </div>
  <ul id="run-list"><li style="color:#a0aec0;">토큰을 입력하면 표시됩니다.</li></ul>
</div>

<footer>
  <a href="https://github.com/jung372/KTX-booker" target="_blank">GitHub 저장소</a> ·
  시간표는 매일 자정 자동 갱신 · 특실 가용 여부는 예약 시 실시간 확인
</footer>

<script>
  const REPO      = 'jung372/KTX-booker';
  const WF_SEARCH = 'ktx_search.yml';
  const WF_BOOK   = 'ktx_bot.yml';
  const RAW_BASE  = `https://raw.githubusercontent.com/${REPO}/main`;

  const STATIONS = [
    '서울','용산','영등포','수원','천안아산','오송','대전',
    '김천구미','동대구','경주','포항','울산','부산',
    '광주송정','목포','여수엑스포','전주','익산',
    '강릉','진부','평창','둔내','횡성','만종','원주',
    '청량리','상봉'
  ];

  let scheduleData = null;
  let selectedTrain = null;

  // ── 초기화 ──────────────────────────────────────────
  function init() {
    STATIONS.forEach(s => {
      ['dep_station','arr_station'].forEach(id => {
        const o = document.createElement('option');
        o.value = o.textContent = s;
        document.getElementById(id).appendChild(o);
      });
    });
    document.getElementById('arr_station').value = '부산';
    const d = new Date(); d.setDate(d.getDate() + 1);
    document.getElementById('dep_date').value = d.toISOString().slice(0,10);
    document.getElementById('pat').value = loadPat();
    if (loadPat()) loadRuns();
    loadSchedule();
  }

  // ── 시간표 로드 ──────────────────────────────────────
  async function loadSchedule() {
    const badge = document.getElementById('schedule-badge');
    try {
      // 날짜 기반 캐시 버스터 (하루 단위 갱신)
      const today = new Date().toISOString().slice(0, 10);
      const res = await fetch(`${RAW_BASE}/data/schedules.json?v=${today}`);
      const data = await res.json();

      if (data.routes && Object.keys(data.routes).length > 0) {
        scheduleData = data;
        const dt = data.generated_at
          ? new Date(data.generated_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
          : '알 수 없음';
        badge.textContent = `시간표 준비 (${dt} 기준)`;
        badge.className = 'schedule-badge ready';
        onRouteChange(); // 현재 선택에 맞게 즉시 표시
      } else {
        badge.textContent = '시간표 없음 (수동 조회 필요)';
        badge.className = 'schedule-badge none';
        showLiveButton(true);
      }
    } catch {
      badge.textContent = '시간표 로드 실패';
      badge.className = 'schedule-badge none';
      showLiveButton(true);
    }
  }

  // ── 역/날짜/시간 변경 시 즉시 반영 ──────────────────
  function onRouteChange() {
    const dep  = document.getElementById('dep_station').value;
    const arr  = document.getElementById('arr_station').value;
    const date = document.getElementById('dep_date').value;
    const time = document.getElementById('dep_time').value;

    if (!scheduleData || !date) return;

    const key    = `${dep}>${arr}`;
    const dayData = scheduleData.routes?.[key]?.[date];

    if (dayData === undefined) {
      // 이 구간은 사전 데이터 없음 → 실시간 조회 버튼 표시
      showLiveButton(true);
      document.getElementById('train-section').style.display = 'none';
      document.getElementById('book-section').style.display  = 'none';
      return;
    }

    showLiveButton(false);
    const filtered = filterByTime(dayData, time);
    renderTrains(filtered, dep, arr, time);
  }

  function filterByTime(trains, depTime) {
    const start = toMin(depTime);
    if (start < 0) return trains;
    const end = start + 120;
    return trains.filter(t => {
      const m = toMin(t.dep_time);
      if (m < 0) return true;
      if (end >= 24 * 60) return m >= start || m <= end - 24 * 60;
      return m >= start && m <= end;
    });
  }

  function showLiveButton(show) {
    document.getElementById('live-btn').style.display = show ? 'block' : 'none';
  }

  // ── 열차 렌더링 ─────────────────────────────────────
  function renderTrains(trains, dep, arr, depTime) {
    selectedTrain = null;
    document.getElementById('book-section').style.display = 'none';
    document.getElementById('book-btn').disabled = true;

    const [h, m] = depTime.split(':').map(Number);
    const endH   = Math.floor((h * 60 + m + 120) / 60) % 24;
    const endM   = (h * 60 + m + 120) % 60;
    document.getElementById('time-range-label').textContent =
      `${depTime} ~ ${pad(endH)}:${pad(endM)}`;

    const isSchedule = !!scheduleData;
    document.getElementById('train-meta').textContent = isSchedule
      ? `※ 시간표 기준 · 특실 가용 여부는 예약 시 실시간 확인`
      : `실시간 조회 결과`;

    const grid = document.getElementById('train-grid');
    grid.innerHTML = '';

    if (!trains.length) {
      grid.innerHTML = '<div class="empty-msg">해당 시간대 열차가 없습니다.</div>';
      document.getElementById('train-section').style.display = 'block';
      return;
    }

    trains.forEach(t => {
      const card = document.createElement('div');
      card.className = 'train-card';
      card.innerHTML = `
        <div class="train-no">KTX<br>${t.train_no}</div>
        <div class="train-times">
          <div class="time-row">${t.dep_time}<span class="arrow">→</span>${t.arr_time}</div>
          <div class="station-row">${dep} → ${arr}</div>
        </div>
      `;
      card.onclick = () => selectTrain(t, dep, arr, card);
      grid.appendChild(card);
    });

    document.getElementById('train-section').style.display = 'block';
    document.getElementById('search-toast').className = 'toast';
  }

  function selectTrain(t, dep, arr, card) {
    document.querySelectorAll('.train-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedTrain = { ...t, dep_station: dep, arr_station: arr };
    document.getElementById('selected-info').textContent =
      `KTX ${t.train_no} · ${t.dep_time} → ${t.arr_time} · ${dep} → ${arr}`;
    document.getElementById('book-btn').disabled = false;
    document.getElementById('book-section').style.display = 'block';
    document.getElementById('book-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── 실시간 조회 (사전 데이터 없는 구간용) ───────────
  async function doLiveSearch() {
    const pat = getPat();
    if (!pat) { toast('search-toast', 'GitHub Token을 입력하세요.', 'err'); return; }

    const dep_station = document.getElementById('dep_station').value;
    const arr_station = document.getElementById('arr_station').value;
    const dep_date    = document.getElementById('dep_date').value;
    const dep_time    = document.getElementById('dep_time').value;

    if (!dep_date) { toast('search-toast', '날짜를 입력하세요.', 'err'); return; }

    document.getElementById('live-btn').disabled = true;
    document.getElementById('live-status').style.display = 'block';
    document.getElementById('train-section').style.display = 'none';
    document.getElementById('book-section').style.display  = 'none';
    document.getElementById('search-toast').className = 'toast';

    try {
      const triggerTime = new Date().toISOString();
      setLiveMsg('조회 요청 중...');

      const r = await fetch(
        `https://api.github.com/repos/${REPO}/actions/workflows/${WF_SEARCH}/dispatches`,
        { method: 'POST', headers: ghHeaders(),
          body: JSON.stringify({ ref: 'main', inputs: { dep_station, arr_station, dep_date, dep_time } }) }
      );
      if (r.status !== 204) {
        const b = await r.json().catch(() => ({}));
        throw new Error(`트리거 실패 (${r.status}): ${b.message || ''}`);
      }

      setLiveMsg('GitHub Actions 실행 대기 중...');
      const run = await waitForNewRun(WF_SEARCH, triggerTime);
      const done = await waitRunCompletion(run.id);
      if (done.conclusion !== 'success') throw new Error(`조회 실패. Actions 로그를 확인하세요.`);

      setLiveMsg('결과 불러오는 중...');
      const result = await fetchFileJSON('data/search_results.json');
      document.getElementById('live-status').style.display = 'none';
      document.getElementById('live-btn').disabled = false;
      renderTrains(result.trains || [], dep_station, arr_station, dep_time);
      loadRuns();
    } catch (e) {
      document.getElementById('live-status').style.display = 'none';
      document.getElementById('live-btn').disabled = false;
      toast('search-toast', `오류: ${e.message}`, 'err');
    }
  }

  function setLiveMsg(msg) { document.getElementById('live-msg').textContent = msg; }

  // ── 예약 ────────────────────────────────────────────
  async function doBook() {
    if (!selectedTrain) return;
    const pat = getPat();
    if (!pat) { toast('book-toast', 'GitHub Token을 입력하세요.', 'err'); return; }

    const dep_date = document.getElementById('dep_date').value;
    const dep_time = document.getElementById('dep_time').value;
    const { dep_station, arr_station, train_no } = selectedTrain;

    document.getElementById('book-btn').disabled = true;
    document.getElementById('book-btn').textContent = '⏳ 요청 중...';

    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/actions/workflows/${WF_BOOK}/dispatches`,
        { method: 'POST', headers: ghHeaders(),
          body: JSON.stringify({ ref: 'main',
            inputs: { dep_station, arr_station, dep_date, dep_time, target_train_no: train_no } }) }
      );
      if (res.status === 204) {
        toast('book-toast', `✅ KTX ${train_no} 예약 봇 시작! 텔레그램으로 결과를 알려드립니다.`, 'ok');
        setTimeout(loadRuns, 3000);
      } else {
        const b = await res.json().catch(() => ({}));
        throw new Error(`${res.status}: ${b.message || '요청 실패'}`);
      }
    } catch (e) {
      toast('book-toast', `오류: ${e.message}`, 'err');
    } finally {
      document.getElementById('book-btn').disabled = false;
      document.getElementById('book-btn').textContent = '🚀 예약 봇 시작';
    }
  }

  // ── 최근 실행 ────────────────────────────────────────
  async function loadRuns() {
    const pat = getPat() || loadPat();
    if (!pat) return;
    const list = document.getElementById('run-list');
    list.innerHTML = '<li style="color:#a0aec0;">불러오는 중...</li>';
    try {
      const wfs = [WF_SEARCH, WF_BOOK, 'ktx_schedule.yml'];
      const labels = { [WF_SEARCH]: '조회', [WF_BOOK]: '예약', 'ktx_schedule.yml': '시간표' };
      const results = await Promise.all(wfs.map(wf =>
        fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${wf}/runs?per_page=2`, { headers: ghHeaders() })
          .then(r => r.json())
          .then(d => (d.workflow_runs || []).map(r => ({ ...r, wf: labels[wf] })))
      ));
      const runs = results.flat()
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .slice(0, 6);

      if (!runs.length) { list.innerHTML = '<li style="color:#a0aec0;">실행 기록 없음</li>'; return; }

      const lbl = { success:'완료', failure:'실패', cancelled:'취소', in_progress:'실행 중', queued:'대기 중' };
      list.innerHTML = runs.map(r => {
        const s    = r.status === 'completed' ? r.conclusion : r.status;
        const date = new Date(r.created_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        return `<li>
          <span>
            <span style="font-size:0.68rem;background:#e2e8f0;border-radius:4px;padding:1px 5px;margin-right:4px;">${r.wf}</span>
            <a href="${r.html_url}" target="_blank" style="color:#3b82f6;text-decoration:none;">#${r.run_number}</a>
            &nbsp;${date}
          </span>
          <span class="badge ${s}">${lbl[s] || s}</span>
        </li>`;
      }).join('');
    } catch {
      list.innerHTML = '<li style="color:#e53e3e;">불러오기 실패</li>';
    }
  }

  // ── GitHub API 유틸 ──────────────────────────────────
  async function waitForNewRun(wf, after, max = 60) {
    for (let i = 0; i < max; i++) {
      await sleep(5000);
      const d = await fetch(
        `https://api.github.com/repos/${REPO}/actions/workflows/${wf}/runs?per_page=1`,
        { headers: ghHeaders() }
      ).then(r => r.json());
      const run = d.workflow_runs?.[0];
      if (run && new Date(run.created_at) > new Date(after)) return run;
    }
    throw new Error('실행 대기 시간 초과');
  }

  async function waitRunCompletion(id, max = 120) {
    for (let i = 0; i < max; i++) {
      await sleep(5000);
      setLiveMsg(`실행 중... (${Math.round((i+1)*5/60*10)/10}분 경과)`);
      const r = await fetch(`https://api.github.com/repos/${REPO}/actions/runs/${id}`, { headers: ghHeaders() }).then(r => r.json());
      if (r.status === 'completed') return r;
    }
    throw new Error('시간 초과');
  }

  async function fetchFileJSON(path) {
    const d = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { headers: ghHeaders() }).then(r => r.json());
    return JSON.parse(atob(d.content.replace(/\n/g, '')));
  }

  // ── 공통 유틸 ────────────────────────────────────────
  function toMin(t) {
    if (!t) return -1;
    try { const [h, m] = t.trim().split(':'); return +h * 60 + +m; } catch { return -1; }
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function ghHeaders() {
    return { 'Authorization': `Bearer ${getPat()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
  }

  function getPat()  { const v = document.getElementById('pat').value.trim(); return v; }
  function savePat(v) { if (v) localStorage.setItem('ktx_pat', v); }
  function loadPat()  { return localStorage.getItem('ktx_pat') || ''; }
  function togglePat() { const e = document.getElementById('pat'); e.type = e.type === 'password' ? 'text' : 'password'; }

  function toast(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = `toast ${type}`;
  }

  init();
</script>
</body>
</html>
