name: KTX 특실 자동 예약

on:
  workflow_dispatch:
    inputs:
      dep_station:
        description: "출발역"
        required: true
        default: "서울"
      arr_station:
        description: "도착역"
        required: true
        default: "부산"
      dep_date:
        description: "날짜 (YYYY-MM-DD)"
        required: true
      dep_time:
        description: "희망 시간 (HH:MM, 이 시각 이후 첫 특실 예약)"
        required: true
        default: "06:00"

jobs:
  reserve:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # GitHub Actions 최대 6시간

    env:
      # ── GitHub Secrets → 환경변수 ───────────────────
      KORAIL_ID:          ${{ secrets.KORAIL_ID }}
      KORAIL_PW:          ${{ secrets.KORAIL_PW }}
      TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      # ── workflow_dispatch 입력 → 여정 환경변수 ───────
      JOURNEY_DEP_STATION: ${{ github.event.inputs.dep_station }}
      JOURNEY_ARR_STATION: ${{ github.event.inputs.arr_station }}
      JOURNEY_DATE:        ${{ github.event.inputs.dep_date }}
      JOURNEY_TIME:        ${{ github.event.inputs.dep_time }}
      CI: "true"           # headless 모드 강제 활성화

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 봇 실행
        run: python run_bot.py
