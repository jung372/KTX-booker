name: KTX 시간표 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 자정 KST (= UTC 15:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    env:
      KORAIL_ID:       ${{ secrets.KORAIL_ID }}
      KORAIL_PW:       ${{ secrets.KORAIL_PW }}
      SCHEDULE_ROUTES: "서울>부산,부산>서울,서울>경주,경주>서울"
      CI: "true"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: pip 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 캐시
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Playwright 브라우저 설치 (캐시 미스)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Playwright 시스템 의존성 (캐시 히트)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 시간표 조회
        run: python fetch_schedule.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedules.json
          git diff --staged --quiet || git commit -m "chore: daily schedule update [skip ci]"
          git push

      - name: 디버그 스크린샷 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-schedule
          path: "*.png"
          if-no-files-found: ignore
