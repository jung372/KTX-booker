<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>K-Reservation Bot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --blue: #1565c0;
      --c-idle:      #9e9e9e;
      --c-searching: #2196f3;
      --c-reserving: #ff9800;
      --c-success:   #4caf50;
      --c-error:     #f44336;
    }
    body { background:#f0f2f5; padding-bottom:72px; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }

    /* 헤더 */
    .app-header {
      background:linear-gradient(135deg,#1565c0,#0d47a1);
      color:#fff; padding:14px 16px 10px;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
    }
    .app-header h1 { font-size:1.1rem; font-weight:700; margin:0; }
    .app-header small { font-size:.75rem; opacity:.8; }

    /* 카드 */
    .card { border-radius:12px; border:none; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .tab-pane { padding:12px 12px 0; }
    .section-title {
      font-size:.7rem; font-weight:700; color:var(--blue);
      text-transform:uppercase; letter-spacing:.08em;
      margin-bottom:6px; margin-top:4px;
    }
    .form-label  { font-size:.82rem; font-weight:600; color:#555; }
    .form-control,.form-select { border-radius:10px; font-size:.88rem; }
    .btn-lg { border-radius:12px; font-weight:600; }

    /* 스왑 버튼 */
    .swap-btn {
      width:34px; height:34px; border-radius:50%;
      border:1.5px solid var(--blue); background:#fff; color:var(--blue);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1rem; padding:0; flex-shrink:0;
      transition:background .15s,color .15s;
    }
    .swap-btn:hover { background:var(--blue); color:#fff; }

    /* 시간대 드롭다운 */
    #dashHour { max-width:160px; }

    /* 열차 카드 */
    .train-card {
      border:2px solid #e0e0e0; border-radius:12px;
      padding:12px 14px; margin-bottom:8px;
      background:#fff; cursor:pointer;
      transition:border-color .15s, box-shadow .15s;
    }
    .train-card:hover { border-color:var(--blue); }
    .train-card.selected { border-color:var(--blue); box-shadow:0 0 0 3px rgba(21,101,192,.15); }
    .train-card.disabled { opacity:.55; cursor:default; pointer-events:none; }
    .train-time { font-size:1.05rem; font-weight:700; color:#222; }
    .train-dur  { font-size:.75rem; color:#888; }
    .seat-badge {
      display:inline-block; padding:2px 10px; border-radius:999px;
      font-size:.72rem; font-weight:600; color:#fff;
    }
    .seat-badge.ok     { background:var(--c-success); }
    .seat-badge.sold   { background:#bdbdbd; }
    .train-no { font-size:.72rem; color:#999; margin-bottom:4px; }

    /* 로딩 스피너 */
    #searchSpinner { display:none; }

    /* 상태 배지 */
    .status-badge {
      display:inline-block; padding:4px 14px; border-radius:999px;
      font-size:.8rem; font-weight:600; color:#fff;
      background:var(--c-idle); transition:background .3s;
    }
    .status-badge.idle      { background:var(--c-idle); }
    .status-badge.searching { background:var(--c-searching); }
    .status-badge.reserving { background:var(--c-reserving); }
    .status-badge.success   { background:var(--c-success); }
    .status-badge.error     { background:var(--c-error); }
    .pulse { animation:pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* 로그 */
    #logBox {
      background:#1e1e1e; color:#d4d4d4;
      font-family:'Courier New',monospace; font-size:.72rem;
      height:240px; overflow-y:auto; border-radius:8px;
      padding:10px; white-space:pre-wrap; word-break:break-all;
    }
    #logBox .log-line         { display:block; margin-bottom:2px; }
    #logBox .log-line.success { color:#69f0ae; }
    #logBox .log-line.error   { color:#ff5252; }
    #logBox .log-line.warn    { color:#ffd740; }

    /* 설정 탭 */
    .journey-card {
      background:#fff; border-radius:12px; padding:14px;
      margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,.08);
    }
    .journey-rank {
      width:24px; height:24px; background:var(--blue); color:#fff;
      border-radius:50%; font-size:.75rem; font-weight:700;
      display:inline-flex; align-items:center; justify-content:center;
      margin-right:6px;
    }

    /* 하단 탭 */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:#fff; border-top:1px solid #e0e0e0;
      display:flex; z-index:200;
      box-shadow:0 -2px 8px rgba(0,0,0,.07);
    }
    .bottom-nav button {
      flex:1; border:none; background:none; padding:10px 0 8px;
      font-size:.65rem; color:#9e9e9e;
      display:flex; flex-direction:column; align-items:center; gap:2px;
      transition:color .15s;
    }
    .bottom-nav button i { font-size:1.3rem; }
    .bottom-nav button.active { color:var(--blue); }

    /* 선택된 열차 요약 */
    #selectedSummary {
      background:#e3f2fd; border:1.5px solid #90caf9;
      border-radius:10px; padding:10px 14px; font-size:.82rem;
      margin-bottom:10px; display:none;
    }
  </style>
</head>
<body>

<!-- 서버 미연결 경고 배너 -->
<div id="offlineBanner" style="
  display:none; background:#b71c1c; color:#fff;
  text-align:center; padding:8px 12px; font-size:.8rem; font-weight:600;
  position:sticky; top:0; z-index:200;">
  ⚠️ 서버에 연결할 수 없습니다. <span id="offlineReason"></span>
</div>

<!-- 헤더 -->
<div class="app-header">
  <div class="d-flex align-items-center justify-content-between">
    <div>
      <h1><i class="bi bi-train-front-fill me-1"></i> K-Reservation Bot</h1>
      <small>KTX 특실 자동 예약 시스템</small>
    </div>
    <div id="connDot" title="서버 연결 상태" style="
      width:10px; height:10px; border-radius:50%;
      background:#9e9e9e; flex-shrink:0; margin-top:2px;">
    </div>
  </div>
</div>

<!-- ── 대시보드 탭 ── -->
<div id="tabDashboard" class="tab-pane">

  <!-- 검색 폼 카드 -->
  <div class="card p-3 mb-3 mt-1">
    <p class="section-title">열차 조회</p>

    <!-- 출발역 ↔ 도착역 -->
    <div class="d-flex align-items-end gap-2 mb-2">
      <div class="flex-fill">
        <label class="form-label">출발역</label>
        <select id="dashDep" class="form-select">
          <option value="">역 선택</option>
        </select>
      </div>
      <button class="swap-btn mb-1" onclick="swapStations()" title="출발↔도착 교환">
        <i class="bi bi-arrow-left-right"></i>
      </button>
      <div class="flex-fill">
        <label class="form-label">도착역</label>
        <select id="dashArr" class="form-select">
          <option value="">역 선택</option>
        </select>
      </div>
    </div>

    <!-- 날짜 + 희망 시간대 -->
    <div class="row g-2 mb-3">
      <div class="col-7">
        <label class="form-label">날짜</label>
        <input id="dashDate" type="date" class="form-control" />
      </div>
      <div class="col-5">
        <label class="form-label">희망 시간대</label>
        <select id="dashHour" class="form-select">
          <option value="00:00">전체 시간</option>
        </select>
      </div>
    </div>

    <!-- 검색 버튼 -->
    <button class="btn btn-primary btn-lg w-100" onclick="searchTrains()">
      <i class="bi bi-search me-1"></i>검색하기
    </button>
  </div>

  <!-- 검색 중 스피너 -->
  <div id="searchSpinner" class="text-center py-4">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 text-muted" style="font-size:.82rem;">코레일 접속 중… (최대 1분 소요)</div>
  </div>

  <!-- 열차 목록 -->
  <div id="trainSection" style="display:none;">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="section-title mb-0" id="trainSectionTitle">조회 결과</span>
      <span class="text-muted" style="font-size:.72rem;" id="trainCount"></span>
    </div>
    <div id="trainList"></div>
  </div>

  <!-- 선택된 열차 요약 -->
  <div id="selectedSummary">
    <i class="bi bi-check-circle-fill text-primary me-1"></i>
    <span id="selectedSummaryText"></span>
  </div>

  <!-- 현재 상태 카드 -->
  <div class="card p-3 mb-3">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="section-title mb-0">모니터링 상태</span>
      <span id="statusBadge" class="status-badge idle">대기 중</span>
    </div>
    <div id="currentJourney" class="text-muted" style="font-size:.82rem; min-height:18px;"></div>
    <div class="d-flex align-items-center gap-2 mt-2">
      <i class="bi bi-arrow-repeat text-secondary" style="font-size:.9rem;"></i>
      <span id="attemptCount" style="font-size:.82rem; color:#555;">시도 횟수: 0회</span>
    </div>
  </div>

  <!-- 시작 / 중지 버튼 -->
  <div class="d-flex gap-2 mb-3">
    <button id="btnStart" class="btn btn-success btn-lg flex-fill" onclick="startEngine()" disabled>
      <i class="bi bi-play-fill me-1"></i>모니터링 시작
    </button>
    <button id="btnStop" class="btn btn-outline-danger btn-lg" style="min-width:80px;" onclick="stopEngine()" disabled>
      <i class="bi bi-stop-fill me-1"></i>중지
    </button>
  </div>

  <!-- 실시간 로그 -->
  <div class="card p-3 mb-3">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="section-title mb-0">실시간 로그</span>
      <button class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.72rem;" onclick="clearLog()">지우기</button>
    </div>
    <div id="logBox"></div>
  </div>
</div>

<!-- ── 설정 탭 ── -->
<div id="tabConfig" class="tab-pane" style="display:none;">

  <!-- 코레일 계정 -->
  <div class="card p-3 mb-3 mt-1">
    <p class="section-title">코레일 계정</p>
    <div class="mb-2">
      <label class="form-label">아이디</label>
      <input id="cfgId" type="text" class="form-control" placeholder="코레일 로그인 아이디" autocomplete="username" />
    </div>
    <div>
      <label class="form-label">비밀번호</label>
      <div class="input-group">
        <input id="cfgPw" type="password" class="form-control" placeholder="비밀번호" autocomplete="current-password" />
        <button class="btn btn-outline-secondary" type="button" onclick="togglePw()">
          <i id="pwEyeIcon" class="bi bi-eye"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- 텔레그램 -->
  <div class="card p-3 mb-3">
    <p class="section-title">텔레그램 알림</p>
    <div class="mb-2">
      <label class="form-label">Bot Token</label>
      <input id="cfgToken" type="text" class="form-control" placeholder="123456:ABC-..." />
    </div>
    <div>
      <label class="form-label">Chat ID</label>
      <input id="cfgChatId" type="text" class="form-control" placeholder="-100..." />
    </div>
  </div>

  <!-- 추가 여정 (2~3순위) -->
  <div class="card p-3 mb-3">
    <p class="section-title">추가 여정 (2~3순위, 선택 사항)</p>
    <p class="text-muted" style="font-size:.78rem; margin-bottom:10px;">
      대시보드에서 선택한 열차가 1순위입니다. 여기서 추가 여정을 설정하면 1순위 예약 실패 시 순서대로 시도합니다.
    </p>
    <div id="extraJourneyList"></div>
  </div>

  <!-- 저장 버튼 -->
  <button class="btn btn-primary btn-lg w-100 mb-3" onclick="saveConfig()">
    <i class="bi bi-floppy-fill me-1"></i>설정 저장
  </button>
</div>

<!-- 하단 탭 네비게이션 -->
<nav class="bottom-nav">
  <button id="navDashboard" class="active" onclick="switchTab('dashboard')">
    <i class="bi bi-speedometer2"></i>대시보드
  </button>
  <button id="navConfig" onclick="switchTab('config')">
    <i class="bi bi-gear-fill"></i>설정
  </button>
</nav>

<script>
// ── 역 목록 ──────────────────────────────────────────────────────────────────
let STATIONS = [];

async function loadStations() {
  try {
    STATIONS = await (await fetch('/api/stations')).json();
  } catch { STATIONS = []; }

  const ids = ['dashDep', 'dashArr'];
  ids.forEach(id => fillStationSelect(id, ''));

  // 설정 탭 추가 여정 select도 채우기
  buildExtraJourneyUI();
}

function fillStationSelect(id, selectedVal) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const prev = selectedVal !== undefined ? selectedVal : sel.value;
  sel.innerHTML = '<option value="">역 선택</option>';
  STATIONS.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    if (s === prev) o.selected = true;
    sel.appendChild(o);
  });
}

// ── 시간대 드롭다운 (1시간 단위) ─────────────────────────────────────────────
function buildHourOptions() {
  const sel = document.getElementById('dashHour');
  sel.innerHTML = '<option value="00:00">전체 시간</option>';
  for (let h = 5; h <= 22; h++) {
    const hh = String(h).padStart(2, '0');
    const o = document.createElement('option');
    o.value = `${hh}:00`;
    o.textContent = `${hh}시 이후`;
    sel.appendChild(o);
  }
}

// ── 스왑 ─────────────────────────────────────────────────────────────────────
function swapStations() {
  const dep = document.getElementById('dashDep');
  const arr = document.getElementById('dashArr');
  const tmp = dep.value;
  dep.value = arr.value;
  arr.value = tmp;
}

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabDashboard').style.display = tab === 'dashboard' ? '' : 'none';
  document.getElementById('tabConfig').style.display    = tab === 'config'    ? '' : 'none';
  document.getElementById('navDashboard').classList.toggle('active', tab === 'dashboard');
  document.getElementById('navConfig').classList.toggle('active', tab === 'config');
}

// ── SSE ──────────────────────────────────────────────────────────────────────
let evtSource = null;
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/api/events');
  evtSource.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'status') applyStatus(d);
    if (d.type === 'log')    appendLog(d.message);
  };
  evtSource.onerror = () => setTimeout(connectSSE, 3000);
}

// ── 상태 UI ──────────────────────────────────────────────────────────────────
const STATUS_LABEL = {
  idle:'대기 중', searching:'조회 중 …', reserving:'예약 진행 중 …',
  success:'예약 완료!', error:'오류 발생'
};
function applyStatus(data) {
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge ' + data.status;
  badge.classList.toggle('pulse', ['searching','reserving'].includes(data.status));
  badge.textContent = STATUS_LABEL[data.status] || data.status;
  document.getElementById('currentJourney').textContent = data.journey || '';
  document.getElementById('attemptCount').textContent = `시도 횟수: ${data.attempts}회`;

  const running = data.running;
  document.getElementById('btnStop').disabled = !running;
  // 시작 버튼은 열차가 선택된 경우에만 활성화
  if (!running) updateStartBtn();
}

// ── 로그 ─────────────────────────────────────────────────────────────────────
const MAX_LOG = 300;
let logLines = [];
function appendLog(msg) {
  const cls = msg.includes('완료')||msg.includes('성공') ? 'success'
            : msg.includes('오류')||msg.includes('실패') ? 'error'
            : msg.includes('발견') ? 'warn' : '';
  logLines.push({msg, cls});
  if (logLines.length > MAX_LOG) logLines.shift();
  renderLog();
}
function renderLog() {
  const box = document.getElementById('logBox');
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 40;
  box.innerHTML = logLines.map(l =>
    `<span class="log-line ${l.cls}">${escHtml(l.msg)}</span>`).join('');
  if (atBottom) box.scrollTop = box.scrollHeight;
}
function clearLog() { logLines = []; document.getElementById('logBox').innerHTML = ''; }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 열차 검색 ────────────────────────────────────────────────────────────────
let selectedTrain = null;
let lastSearchParams = {};

async function searchTrains() {
  const dep  = document.getElementById('dashDep').value;
  const arr  = document.getElementById('dashArr').value;
  const date = document.getElementById('dashDate').value;
  const hour = document.getElementById('dashHour').value;

  if (!dep)  { showToast('출발역을 선택하세요.'); return; }
  if (!arr)  { showToast('도착역을 선택하세요.');  return; }
  if (!date) { showToast('날짜를 선택하세요.');    return; }

  lastSearchParams = { dep_station: dep, arr_station: arr, dep_date: date, dep_time: hour };
  selectedTrain = null;
  updateStartBtn();
  document.getElementById('selectedSummary').style.display = 'none';

  // 로딩 표시
  document.getElementById('trainSection').style.display = 'none';
  document.getElementById('searchSpinner').style.display = '';

  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 120000);

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(lastSearchParams),
      signal: ctrl.signal,
    });
    clearTimeout(tid);
    const data = await res.json();
    if (data.ok) {
      renderTrainList(data.trains, dep, arr, date);
    } else {
      showToast('검색 실패: ' + data.error);
    }
  } catch (e) {
    if (e.name === 'AbortError') showToast('검색 시간이 초과되었습니다. 다시 시도하세요.');
    else showToast('검색 중 오류가 발생했습니다.');
  } finally {
    document.getElementById('searchSpinner').style.display = 'none';
  }
}

function renderTrainList(trains, dep, arr, date) {
  const section = document.getElementById('trainSection');
  const list    = document.getElementById('trainList');
  const title   = document.getElementById('trainSectionTitle');
  const count   = document.getElementById('trainCount');

  title.textContent = `${dep} → ${arr}  ${date}`;
  count.textContent = `총 ${trains.length}편`;

  if (trains.length === 0) {
    list.innerHTML = '<div class="text-center text-muted py-3" style="font-size:.85rem;">조회된 열차가 없습니다.</div>';
    section.style.display = '';
    return;
  }

  list.innerHTML = trains.map(t => {
    const avail = t.special_available;
    const badge = avail
      ? '<span class="seat-badge ok">특실 예약가능</span>'
      : '<span class="seat-badge sold">특실 매진 (모니터링 가능)</span>';
    return `
    <div class="train-card" id="tc-${t.train_no}" onclick="selectTrain(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="train-no">열차번호 ${t.train_no}</div>
      <div class="d-flex align-items-center justify-content-between">
        <span class="train-time">${t.dep_time} → ${t.arr_time}</span>
        ${badge}
      </div>
    </div>`;
  }).join('');

  section.style.display = '';
}

function selectTrain(train) {
  // 이전 선택 해제
  document.querySelectorAll('.train-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`tc-${train.train_no}`);
  if (card) card.classList.add('selected');

  selectedTrain = train;
  updateStartBtn();

  const avail = train.special_available ? '특실 예약 가능' : '특실 매진 (빈자리 모니터링)';
  document.getElementById('selectedSummaryText').textContent =
    `선택: 열차 ${train.train_no}  ${train.dep_time}→${train.arr_time}  ${avail}`;
  document.getElementById('selectedSummary').style.display = '';
}

function updateStartBtn() {
  document.getElementById('btnStart').disabled = !selectedTrain;
}

// ── 엔진 제어 ─────────────────────────────────────────────────────────────────
async function startEngine() {
  if (!selectedTrain) { showToast('열차를 먼저 선택하세요.'); return; }

  const body = {
    ...lastSearchParams,
    dep_time:        selectedTrain.dep_time,
    target_train_no: selectedTrain.train_no,
  };

  const res = await fetch('/api/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!data.ok) alert('시작 실패\n' + data.error);
}

async function stopEngine() {
  await fetch('/api/stop', { method: 'POST' });
}

// ── 설정 탭 ──────────────────────────────────────────────────────────────────
function buildExtraJourneyUI() {
  const wrap = document.getElementById('extraJourneyList');
  wrap.innerHTML = '';
  for (let i = 2; i <= 3; i++) {
    const div = document.createElement('div');
    div.className = 'journey-card';
    div.innerHTML = `
      <div class="d-flex align-items-center mb-2">
        <span class="journey-rank">${i}</span>
        <span style="font-size:.82rem;font-weight:600;">${i}순위 여정</span>
      </div>
      <div class="row g-2">
        <div class="col-6">
          <label class="form-label">출발역</label>
          <select id="dep${i}" class="form-select"><option value="">역 선택</option></select>
        </div>
        <div class="col-6">
          <label class="form-label">도착역</label>
          <select id="arr${i}" class="form-select"><option value="">역 선택</option></select>
        </div>
        <div class="col-7">
          <label class="form-label">날짜</label>
          <input id="date${i}" type="date" class="form-control" />
        </div>
        <div class="col-5">
          <label class="form-label">시간대</label>
          <input id="time${i}" type="time" class="form-control" />
        </div>
      </div>`;
    wrap.appendChild(div);
    fillStationSelect(`dep${i}`, '');
    fillStationSelect(`arr${i}`, '');
  }
}

async function loadConfig() {
  const cfg = await (await fetch('/api/config')).json();
  document.getElementById('cfgId').value     = cfg.korail_id        || '';
  document.getElementById('cfgPw').value     = cfg.korail_pw        || '';
  document.getElementById('cfgToken').value  = cfg.telegram_token   || '';
  document.getElementById('cfgChatId').value = cfg.telegram_chat_id || '';

  // 대시보드 이전 검색 복원
  const p = cfg.primary_journey || {};
  if (p.dep_station) {
    document.getElementById('dashDep').value  = p.dep_station;
    document.getElementById('dashArr').value  = p.arr_station || '';
    document.getElementById('dashDate').value = p.dep_date    || '';
    // 희망 시간대 복원
    if (p.dep_time) {
      const hh = p.dep_time.substring(0, 2);
      document.getElementById('dashHour').value = `${hh}:00`;
    }
  }

  // 추가 여정 복원
  const journeys = cfg.journeys || [];
  for (let i = 2; i <= 3; i++) {
    const j = journeys[i - 2] || {};
    fillStationSelect(`dep${i}`, j.dep_station || '');
    fillStationSelect(`arr${i}`, j.arr_station || '');
    const dateEl = document.getElementById(`date${i}`);
    const timeEl = document.getElementById(`time${i}`);
    if (dateEl) dateEl.value = j.dep_date || '';
    if (timeEl) timeEl.value = j.dep_time || '';
  }
}

async function saveConfig() {
  await checkServer();
  if (!_serverOk) {
    showToast('서버에 연결할 수 없습니다. 화면 상단 빨간 배너를 확인하세요.');
    return;
  }
  try {
    const journeys = [];
    for (let i = 2; i <= 3; i++) {
      journeys.push({
        dep_station: document.getElementById(`dep${i}`)?.value  || '',
        arr_station: document.getElementById(`arr${i}`)?.value  || '',
        dep_date:    document.getElementById(`date${i}`)?.value || '',
        dep_time:    document.getElementById(`time${i}`)?.value || '',
      });
    }
    const payload = {
      korail_id:        document.getElementById('cfgId').value.trim(),
      korail_pw:        document.getElementById('cfgPw').value,
      telegram_token:   document.getElementById('cfgToken').value.trim(),
      telegram_chat_id: document.getElementById('cfgChatId').value.trim(),
      journeys,
      search_interval_min: 1.0,
      search_interval_max: 3.5,
    };
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`서버 오류 (HTTP ${res.status})`);
    const d = await res.json();
    if (d.ok) {
      showToast('설정이 저장되었습니다.');
    } else {
      showToast('저장 실패: ' + (d.error || '알 수 없는 오류'));
    }
  } catch (e) {
    showToast('저장 중 오류: ' + e.message);
    console.error('saveConfig error:', e);
  }
}

function togglePw() {
  const input = document.getElementById('cfgPw');
  const icon  = document.getElementById('pwEyeIcon');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}

// ── 토스트 ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  Object.assign(el.style, {
    position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)',
    background:'rgba(0,0,0,.75)', color:'#fff', padding:'10px 20px',
    borderRadius:'999px', fontSize:'.82rem', zIndex:'9999',
    whiteSpace:'nowrap', pointerEvents:'none',
  });
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// ── 서버 연결 진단 ────────────────────────────────────────────────────────────
let _serverOk = false;

function setConnected(ok, reason) {
  _serverOk = ok;
  const dot    = document.getElementById('connDot');
  const banner = document.getElementById('offlineBanner');
  const reasonEl = document.getElementById('offlineReason');
  dot.style.background = ok ? '#4caf50' : '#f44336';
  dot.title = ok ? '서버 연결됨' : '서버 미연결';
  banner.style.display = ok ? 'none' : '';
  if (reasonEl) reasonEl.textContent = reason || '';
}

async function checkServer() {
  // file:// 로 직접 열었는지 먼저 체크
  if (window.location.protocol === 'file:') {
    setConnected(false,
      '— HTML 파일을 직접 열었습니다. 반드시 "python app.py" 실행 후 http://localhost:5000 으로 접속하세요.');
    return;
  }
  try {
    const res = await fetch('/api/ping', { cache: 'no-store' });
    setConnected(res.ok, '');
  } catch {
    setConnected(false, '— Flask 서버가 실행 중인지 확인하세요. (python app.py)');
  }
}

// ── 초기화 ────────────────────────────────────────────────────────────────────
checkServer().then(() => {
  buildHourOptions();
  loadStations().then(() => loadConfig());
  connectSSE();
});
// 30초마다 연결 상태 재확인
setInterval(checkServer, 30000);
</script>
